name: CI

# PNGCrushCS's Optimizer.Gif depends on the sibling repo `AnythingToGif`
# (Hawkynt.GifFileFormat). We check out both side-by-side so the csproj's
# `..\..\AnythingToGif\GifFileFormat\GifFileFormat.csproj` path resolves.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call: {}

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout PNGCrushCS
        uses: actions/checkout@v4
        with:
          path: PNGCrushCS
          fetch-depth: 0

      - name: Checkout AnythingToGif (sibling)
        uses: actions/checkout@v4
        with:
          repository: Hawkynt/AnythingToGif
          path: AnythingToGif
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Stamp versions into csprojs
        shell: bash
        working-directory: PNGCrushCS
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Restore
        working-directory: PNGCrushCS
        run: dotnet restore PngCrush.slnx -p:EnableWindowsTargeting=true

      - name: Build
        working-directory: PNGCrushCS
        run: dotnet build PngCrush.slnx --configuration Release --no-restore -p:EnableWindowsTargeting=true

      - name: Test (core + format suites)
        working-directory: PNGCrushCS
        run: dotnet test PngCrush.slnx --configuration Release --no-build -p:EnableWindowsTargeting=true --filter "TestCategory!=Regression&TestCategory!=Performance" --logger "trx;LogFileName=tests.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: 'PNGCrushCS/**/TestResults/*.trx'

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PNGCrushCS
        uses: actions/checkout@v4
        with:
          path: PNGCrushCS
          fetch-depth: 0

      - name: Checkout AnythingToGif (sibling)
        uses: actions/checkout@v4
        with:
          repository: Hawkynt/AnythingToGif
          path: AnythingToGif
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Stamp versions
        working-directory: PNGCrushCS
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Test with coverage
        working-directory: PNGCrushCS
        run: dotnet test PngCrush.slnx --configuration Release -p:EnableWindowsTargeting=true --filter "TestCategory!=Regression&TestCategory!=Performance" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        working-directory: PNGCrushCS
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./coverage/**/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:HtmlInline_AzurePipelines

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: PNGCrushCS/coverage/report
